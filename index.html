<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe 星球周期</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e0e0e0; font-family: 'Microsoft YaHei', sans-serif; padding: 20px; min-height: 100vh; }
        h1 { text-align: center; color: #00d4ff; margin-bottom: 20px; font-size: 24px; }
        .card { background: #111118; border: 1px solid #1a1a2e; border-radius: 12px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .card-title { color: #00d4ff; font-size: 18px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #1a1a2e; }
        .item { background: #0d0d14; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 3px solid #00d4ff; transition: opacity 0.3s; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .item-name { color: #fff; font-weight: bold; font-size: 14px; }
        .item-time { color: #ffaa00; font-size: 12px; background: #221a00; padding: 2px 8px; border-radius: 4px; }
        .item-info { color: #888; font-size: 13px; }
        .item-info.expiring { color: #ff4444; }
        .item-info.expired { color: #ff6666; }
        .loading { text-align: center; color: #888; padding: 40px; }
        .error { background: #331111; border: 1px solid #ff4444; color: #ff6666; padding: 15px; border-radius: 8px; }
        .refresh-btn { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: #00d4ff; border: none; color: #000; font-size: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,212,255,0.3); transition: transform 0.2s; }
        .refresh-btn:hover { transform: scale(1.1); }
        .refresh-btn.spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .update-time { text-align: center; color: #555; font-size: 12px; margin-top: 20px; }
        .source-note { text-align: center; color: #444; font-size: 11px; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>🌐 Warframe 星球周期</h1>
    <div id="app"><div class="loading">加载中...</div></div>
    <div class="update-time" id="updateTime"></div>
    <div class="source-note" id="sourceNote"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">🔄</button>

    <script>
        const API_BASE = window.location.origin + '/pc';
        let countdownInterval = null;
        let cycleCache = {};

        const DUVIRI_MOOD_COLORS = {
            'JOY': '#ff66cc',
            'ANGER': '#ff4444',
            'ENVY': '#44ff44',
            'SORROW': '#8888ff',
            'FEAR': '#44ccff'
        };
        const DUVIRI_MOOD_NAMES = {
            'JOY': '喜悦',
            'ANGER': '愤怒',
            'ENVY': '嫉妒',
            'SORROW': '悲伤',
            'FEAR': '恐惧'
        };
        const DUVIRI_MOOD_ORDER = ['JOY', 'ANGER', 'ENVY', 'SORROW', 'FEAR'];

        const CYCLE_CONFIG = {
            '🌙 夜灵平野': { dayMs: 100 * 60 * 1000, nightMs: 50 * 60 * 1000 },
            '❄️ 奥布山谷': { warmMs: 400 * 1000, coldMs: 1200 * 1000 },
            '🦠 魔胎之境': { fassMs: 100 * 60 * 1000, vomeMs: 50 * 60 * 1000 },
            '🌌 扎里曼': { cycleMs: 150 * 60 * 1000 },
            '🌀 复眠螺旋': { moodMs: 2 * 3600 * 1000 }
        };

        // 解析官方 API 的 Expiry 时间
        function parseExpiry(data) {
            if (!data) return null;
            
            let expiryTime;
            
            // 格式1: MongoDB {$date: {$numberLong: "1716201600000"}}
            if (data.Expiry && data.Expiry.$date && data.Expiry.$date.$numberLong) {
                expiryTime = parseInt(data.Expiry.$date.$numberLong);
            }
            // 格式2: 直接字符串
            else if (typeof data === 'string') {
                expiryTime = Date.parse(data);
            }
            // 格式3: 直接 expiry 字段
            else if (data.expiry) {
                expiryTime = Date.parse(data.expiry);
            }
            
            if (isNaN(expiryTime)) return null;
            return expiryTime;
        }

        function calcCountdownFromExpiry(data) {
            const expiryTime = parseExpiry(data);
            if (!expiryTime) return null;
            const now = Date.now();
            const diff = expiryTime - now;
            return { diff, expiryTime };
        }

        function formatTime(diff) {
            if (diff <= 0) return 'expired';
            const hours = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            if (hours > 0) return hours + 'h ' + mins + 'm ' + secs + 's';
            if (mins > 0) return mins + 'm ' + secs + 's';
            return secs + 's';
        }

        function predictNextState(name, lastState) {
            const cfg = CYCLE_CONFIG[name];
            if (!cfg) return null;
            let nextState;
            if (name === '🌙 夜灵平野') {
                nextState = (lastState === '白天') ? '黑夜' : '白天';
            } else if (name === '❄️ 奥布山谷') {
                nextState = (lastState === '温暖') ? '寒冷' : '温暖';
            } else if (name === '🦠 魔胎之境') {
                nextState = (lastState === 'FASS') ? 'VOME' : 'FASS';
            } else if (name === '🌌 扎里曼') {
                nextState = (lastState === 'CORPUS占领') ? 'GRINEER占领' : 'CORPUS占领';
            } else if (name === '🌀 复眠螺旋') {
                const idx = DUVIRI_MOOD_ORDER.indexOf(lastState);
                nextState = DUVIRI_MOOD_ORDER[(idx + 1) % 5];
            }
            return nextState;
        }

        function predictRemaining(name, lastState) {
            const cfg = CYCLE_CONFIG[name];
            if (!cfg) return null;
            let duration;
            if (name === '🌙 夜灵平野') {
                duration = (lastState === '白天') ? cfg.dayMs : cfg.nightMs;
            } else if (name === '❄️ 奥布山谷') {
                duration = (lastState === '温暖') ? cfg.warmMs : cfg.coldMs;
            } else if (name === '🦠 魔胎之境') {
                duration = (lastState === 'FASS') ? cfg.fassMs : cfg.vomeMs;
            } else if (name === '🌌 扎里曼') {
                duration = cfg.cycleMs;
            } else if (name === '🌀 复眠螺旋') {
                duration = cfg.moodMs;
            }
            return duration;
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const elements = document.querySelectorAll('[data-expiry]');
                let hasExpired = false;
                elements.forEach(el => {
                    const expiry = el.getAttribute('data-expiry');
                    const name = el.getAttribute('data-name');
                    const state = el.getAttribute('data-state');
                    const expiryTime = parseInt(expiry);
                    const diff = expiryTime - Date.now();

                    if (diff > 0) {
                        el.textContent = '剩余: ' + formatTime(diff);
                        if (diff < 60000) {
                            el.classList.add('expiring');
                        } else {
                            el.classList.remove('expiring');
                        }
                        el.classList.remove('expired');
                    } else {
                        const cache = cycleCache[name];
                        if (cache && cache.state) {
                            const nextState = predictNextState(name, cache.state);
                            const remaining = predictRemaining(name, nextState);
                            if (remaining) {
                                const expiredAt = expiryTime || Date.now();
                                const sinceExpired = Date.now() - expiredAt;
                                const actualRemaining = remaining - (sinceExpired % remaining);
                                if (actualRemaining > 0) {
                                    el.textContent = '剩余: ' + formatTime(actualRemaining) + ' (推算)';
                                    el.classList.add('expiring');
                                    el.classList.remove('expired');
                                    const stateEl = el.parentElement.querySelector('.item-time');
                                    if (stateEl && nextState) {
                                        let displayState = nextState;
                                        if (name === '🌀 复眠螺旋') {
                                            displayState = DUVIRI_MOOD_NAMES[nextState] || nextState;
                                        }
                                        stateEl.textContent = displayState;
                                    }
                                    return;
                                }
                            }
                        }
                        el.textContent = '剩余: 状态轮换中...';
                        el.classList.add('expired');
                        el.classList.remove('expiring');
                        hasExpired = true;
                    }
                });

                if (hasExpired) {
                    console.log('检测到状态过期，自动刷新...');
                    loadData();
                }
            }, 1000);
        }

        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            if (btn) btn.classList.add('spinning');

            try {
                const worldState = await fetch(API_BASE).then(r => r.ok ? r.json() : null).catch(() => null);

                if (!worldState) {
                    throw new Error('无法获取数据');
                }

                const cycles = [
                    { name: '🌍 地球', data: worldState.EarthCycle, stateKey: 'isDay', dayText: '白天', nightText: '黑夜' },
                    { name: '🌙 夜灵平野', data: worldState.CetusCycle, stateKey: 'isDay', dayText: '白天', nightText: '黑夜' },
                    { name: '❄️ 奥布山谷', data: worldState.VallisCycle, stateKey: 'isWarm', dayText: '温暖', nightText: '寒冷' },
                    { name: '🦠 魔胎之境', data: worldState.CambionCycle, stateKey: 'active', dayText: 'FASS', nightText: 'VOME' },
                    { name: '🌌 扎里曼', data: worldState.ZarimanCycle, stateKey: 'isCorpus', dayText: 'CORPUS占领', nightText: 'GRINEER占领' }
                ];

                let html = '';
                cycles.forEach(c => {
                    if (!c.data) {
                        const cache = cycleCache[c.name];
                        if (cache && cache.state) {
                            let state = cache.state, color;
                            if (c.name === '🦠 魔胎之境') {
                                color = cache.state === 'FASS' ? '#ff4444' : '#4488ff';
                            } else if (c.name === '🌌 扎里曼') {
                                color = cache.state === 'CORPUS占领' ? '#4488ff' : '#ff4444';
                            } else {
                                color = (cache.state === '白天' || cache.state === '温暖') ? '#ffaa00' : '#4488ff';
                            }
                            html += `
                                <div class="item" style="border-left-color: ${color}; opacity: 0.6;">
                                    <div class="item-header">
                                        <span class="item-name">${c.name}</span>
                                        <span class="item-time" style="color:${color}; background: ${color}22;">${state}</span>
                                    </div>
                                    <div class="item-info expired" data-expiry="" data-name="${c.name}" data-state="${cache.state}">
                                        剩余: 连接失败，使用缓存数据
                                    </div>
                                </div>
                            `;
                        }
                        return;
                    }

                    let state, color, rawState;

                    if (c.name === '🦠 魔胎之境') {
                        rawState = (c.data.active || 'FASS').toUpperCase();
                        state = rawState;
                        color = rawState === 'FASS' ? '#ff4444' : '#4488ff';
                    } else if (c.name === '🌌 扎里曼') {
                        rawState = (c.data.state || 'CORPUS占领').toUpperCase();
                        state = rawState;
                        color = rawState.includes('CORPUS') ? '#4488ff' : '#ff4444';
                    } else {
                        const isDay = c.data[c.stateKey];
                        rawState = isDay ? c.dayText : c.nightText;
                        state = rawState;
                        color = isDay ? '#ffaa00' : '#4488ff';
                    }

                    const countdown = calcCountdownFromExpiry(c.data);
                    const isExpired = !countdown || countdown.diff <= 0;
                    const displayTime = isExpired ? '状态轮换中...' : formatTime(countdown.diff);
                    const expiryTime = parseExpiry(c.data) || '';

                    cycleCache[c.name] = { state: rawState, expiry: expiryTime };

                    html += `
                        <div class="item" style="border-left-color: ${color};">
                            <div class="item-header">
                                <span class="item-name">${c.name}</span>
                                <span class="item-time" style="color:${color}; background: ${color}22;">${state}</span>
                            </div>
                            <div class="item-info ${isExpired ? 'expired' : ''}" data-expiry="${expiryTime}" data-name="${c.name}" data-state="${rawState}">
                                剩余: ${displayTime}
                            </div>
                        </div>
                    `;
                });

                document.getElementById('app').innerHTML = '<div class="card"><div class="card-title">星球周期</div>' + html + '</div>';
                document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleString('zh-CN');
                document.getElementById('sourceNote').textContent = '数据源: content.warframe.com (via ' + window.location.host + ')';

                startCountdown();
            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="error">❌ ' + err.message + '</div>';
            } finally {
                if (btn) btn.classList.remove('spinning');
            }
        }

        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
